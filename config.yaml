  #       type: enabled
  #       budget_tokens: 8000

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 2

litellm_settings:
  drop_params: true
  request_timeout: 120

  fallbacks:
    - fast: ["brain"]
    - brain: ["reasoning"]

  cache: true
  cache_params:
    type: local
    ttl: 600
